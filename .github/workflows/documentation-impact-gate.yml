name: Validate documentation impact

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  validate-documentation-impact:
    runs-on: ubuntu-latest
    steps:
      - name: Require a completed documentation-impact assessment
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? '';
            const required = [
              '<!-- documentation-impact: complete -->',
              '## Documentation Impact'
            ];
            const missing = required.filter((value) => !body.includes(value));
            if (missing.length) {
              core.setFailed(
                `Missing required Documentation Impact value(s): ${missing.join(', ')}. ` +
                'Complete the Documentation Impact section and replace the pending marker before merge.'
              );
            }
