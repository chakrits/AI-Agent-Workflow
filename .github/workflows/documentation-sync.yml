name: Create documentation sync exception

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-project-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run validate:project-state

  create-documentation-sync-issue:
    needs: validate-project-state
    if: ${{ always() && needs.validate-project-state.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create a documentation-sync exception issue
        uses: actions/github-script@v7
        with:
          script: |
            const marker = `<!-- documentation-sync:commit-${context.sha} -->`;
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'documentation-sync'
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'documentation-sync',
                color: 'd93f0b',
                description: 'Documentation state audit exception'
              });
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'documentation-sync',
              state: 'all',
              per_page: 100
            });
            if (issues.some((issue) => issue.body?.includes(marker))) {
              core.info(`Documentation sync exception already exists for ${context.sha}.`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Documentation Sync] State audit failed for ${context.sha.slice(0, 7)}`,
              labels: ['documentation-sync'],
              body: `${marker}

            The default-branch project-state audit failed after this commit:

            - Commit: https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}

            Review \`PROJECT_STATUS.md\`, correct the stale state in a dedicated documentation-sync PR, then close this issue with the PR and review-record links.`
            });
