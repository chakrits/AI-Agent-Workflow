name: Validate work item readiness

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  pull-requests: read
  issues: read

jobs:
  validate-work-item-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Require structural lifecycle evidence
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? '';
            const closeout = body.match(/<!-- post-merge-closeout: complete; source-pr-(\d+) -->/);
            if (closeout) {
              const { data: sourcePullRequest } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(closeout[1])
              });
              const sourceLabels = sourcePullRequest.labels.map((label) =>
                typeof label === 'string' ? label : label.name
              );
              if (!sourcePullRequest.pull_request || !sourceLabels.includes('post-merge-closeout')) {
                core.setFailed('Closeout exemption requires a labeled source pull request.');
                return;
              }
              const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              });
              const allowedCloseoutPath = (filename) =>
                ['PROJECT_STATUS.md', 'TASK_LOG.md', 'CHANGELOG.md'].includes(filename) ||
                /^docs\/records\/HANDOFF-POST-MERGE-CLOSEOUT-[^/]+\.md$/.test(filename);
              if (!changedFiles.length || changedFiles.some((file) => !allowedCloseoutPath(file.filename))) {
                core.setFailed('Closeout exemption permits only project-state and post-merge handoff files.');
                return;
              }
              core.info('Authorized post-merge closeout is exempt from Work Item lifecycle readiness.');
              return;
            }

            const workItemMatch = body.match(
              /Developer: Work Item \(Issue\) URL:\s*(https:\/\/github\.com\/([^/]+)\/([^/]+)\/issues\/(\d+))/i
            );
            if (!workItemMatch) {
              core.setFailed('Missing Developer Work Item (Issue) URL.');
              return;
            }

            const [, , workItemOwner, workItemRepo, issueNumberText] = workItemMatch;
            if (workItemOwner !== context.repo.owner || workItemRepo !== context.repo.repo) {
              core.setFailed('Work Item URL must point to this repository.');
              return;
            }
            const issueNumber = Number(issueNumberText);
            const { data: workItem } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            const labels = workItem.labels.map((label) =>
              typeof label === 'string' ? label : label.name
            );
            if (workItem.pull_request) {
              core.setFailed('Work Item URL must reference an Issue, not a pull request.');
              return;
            }
            const phases = labels.filter((label) => label?.startsWith('phase:'));
            const missing = [];
            if (phases.length !== 1) missing.push('exactly one current phase: label');
            if (!labels.includes('status:spec-ready')) missing.push('status:spec-ready');

            if (!context.payload.pull_request.draft) {
              if (!labels.includes('status:development-done')) missing.push('status:development-done');
              if (!labels.includes('status:verification-done')) missing.push('status:verification-done');
              if (!/QA: evidence comment or review URL:\s*https:\/\//i.test(body)) {
                missing.push('QA: evidence comment or review URL');
              }
            }

            if (missing.length) {
              core.setFailed(`Work Item readiness is incomplete: ${missing.join(', ')}.`);
            }
