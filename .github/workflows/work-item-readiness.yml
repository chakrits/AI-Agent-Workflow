name: Validate work item readiness

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  validate-work-item-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the trusted default-branch decision module
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Require structural lifecycle evidence
        uses: actions/github-script@v7
        with:
          script: |
            const { validateReadiness } = await import(
              `${process.env.GITHUB_WORKSPACE}/scripts/work-item-readiness.mjs`
            );
            const pullRequest = context.payload.pull_request;
            const body = pullRequest.body ?? '';
            const closeout = body.match(/<!-- post-merge-closeout: complete; source-pr-(\d+) -->/);
            let sourcePullRequest;
            let changedFiles = [];
            let workItem;

            if (closeout) {
              const { data: source } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(closeout[1])
              });
              sourcePullRequest = {
                isPullRequest: Boolean(source.pull_request),
                labels: source.labels.map((label) => typeof label === 'string' ? label : label.name)
              };
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullRequest.number,
                per_page: 100
              });
              changedFiles = files.map((file) => file.filename);
            } else {
              const match = body.match(
                /Developer: Work Item \(Issue\) URL:\s*(https:\/\/github\.com\/([^/]+)\/([^/]+)\/issues\/(\d+))/i
              );
              if (match) {
                const [, , owner, repo, issueNumberText] = match;
                const sameRepository = owner === context.repo.owner && repo === context.repo.repo;
                if (sameRepository) {
                  const { data: issue } = await github.rest.issues.get({
                    owner,
                    repo,
                    issue_number: Number(issueNumberText)
                  });
                  workItem = {
                    isPullRequest: Boolean(issue.pull_request),
                    isSameRepository: true,
                    labels: issue.labels.map((label) => typeof label === 'string' ? label : label.name)
                  };
                } else {
                  workItem = { isSameRepository: false };
                }
              }
            }

            const errors = validateReadiness({
              body,
              draft: pullRequest.draft,
              workItem,
              changedFiles,
              sourcePullRequest
            });
            if (errors.length) core.setFailed(`Work Item readiness is incomplete: ${errors.join(', ')}.`);
